<!DOCTYPE html>
<html>
<head>
    <title>BMI Result</title>

    <style>
        body{
            background: linear-gradient(to right, #f6d365, #fda085);
            text-align:center;
            font-family:Arial;
        }
        .result{
            background:white;
            width:400px;
            margin:auto;
            padding:20px;
            border-radius:10px;
        }
        img{
            width:120px;
        }
    </style>
</head>
<body>
    <h1>🎉 BMI Result 🎉</h1>
    <img src="https://cdn-icons-png.flaticon.com/512/1048/1048941.png">
    <div class="result">
        <h2>Your BMI = {{ bmi }}</h2>
        <h2>Status = {{ status }}</h2>
        <a href="/">Calculate Again</a>
    </div>
</body>
</html>
